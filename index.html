<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sirran — Prayer Times, Qibla &amp; Quran</title>
<style>
  :root {
    --ivory: #FCF7ED; --panel: #FFFCF5; --ink: #17150F; --muted: #6b6357;
    --emerald: #0D5A4B; --deep: #063C34; --gold: #C9A25A; --hairline: #e7dcc6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ivory: #0B1210; --panel: #13201C; --ink: #F3EEE1; --muted: #a79e8d;
      --emerald: #4FBF9E; --deep: #6FD6B8; --gold: #D9B978; --hairline: #24322c;
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--ivory); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; align-items: center; justify-content: center; text-align: center;
    -webkit-font-smoothing: antialiased;
  }
  .card { max-width: 480px; padding: 48px 26px; }
  .eyebrow { color: var(--gold); font-weight: 700; letter-spacing: .18em; text-transform: uppercase; font-size: 12px; margin: 0 0 14px; }
  h1 { font-size: 44px; margin: 0 0 10px; color: var(--deep); letter-spacing: -0.01em; }
  .tag { color: var(--muted); font-size: 17px; margin: 0 0 8px; }
  .soon { color: var(--emerald); font-weight: 600; font-size: 15px; margin: 6px 0 28px; }
  .links a {
    display: inline-block; margin: 0 8px; color: var(--emerald);
    text-decoration: none; font-weight: 600; font-size: 15px;
    border-bottom: 1px solid var(--hairline); padding-bottom: 2px;
  }
  footer { margin-top: 34px; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>
  <div class="card">
    <p class="eyebrow">Sirran</p>
    <h1>Sirran</h1>
    <p class="tag">Prayer times, Qibla, and the Quran — private by design.</p>
    <p class="soon">Coming soon to iPhone, Apple Watch, Android, and Wear OS.</p>
    <p class="links">
      <a href="/privacy">Privacy Policy</a>
      <a href="/support">Support</a>
    </p>
    <footer>© 2026 Baris Demircan</footer>
  </div>
</body>
</html>
